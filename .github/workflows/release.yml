name: Release

# Tag-based releases require manual approval before any publish runs.
# Each publish job is gated by a GitHub Environment with required reviewers
# (configured under Settings → Environments). Without that approval, the job
# pauses indefinitely and nothing is pushed to npm or Docker Hub.
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type PUBLISH to confirm an intentional release'
        required: true

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm intentional manual release
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "PUBLISH" ]; then
            echo "::error::Manual run requires confirm=PUBLISH"
            exit 1
          fi
      - run: echo "Release guard passed for ${GITHUB_REF}"

  npm-publish:
    runs-on: ubuntu-latest
    needs: guard
    environment:
      name: npm-publish-prod
      url: https://www.npmjs.com/package/@swfte/mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: npm publish --access public --provenance
        env:
          # Bypass the local-publish paranoia guard in package.json's
          # prepublishOnly. This step only runs after the npm-publish-prod
          # environment-approval gate, so a human has confirmed intent.
          SWFTE_PUBLISH_CONFIRMED: '1'
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker-publish:
    runs-on: ubuntu-latest
    needs: npm-publish
    environment:
      name: docker-publish-prod
      url: https://hub.docker.com/r/swfte/mcp-server
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"        >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            swfte/mcp-server:latest
            swfte/mcp-server:${{ steps.meta.outputs.version }}
            ghcr.io/swfteai/swfte-mcp-server:latest
            ghcr.io/swfteai/swfte-mcp-server:${{ steps.meta.outputs.version }}
          labels: |
            org.opencontainers.image.title=Swfte MCP Server
            org.opencontainers.image.description=Official Model Context Protocol server for the Swfte AI platform.
            org.opencontainers.image.url=https://www.swfte.com
            org.opencontainers.image.source=https://github.com/SwfteAI/swfte-mcp-server
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=Swfte, Inc.
          provenance: false
